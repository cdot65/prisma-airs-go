name: Release

on:
  release:
    types: [published]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./...

      - name: Verify tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release tag: $TAG"

      - name: Publish to Go module proxy
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Requesting proxy.golang.org to index $TAG..."
          RESP=$(curl -s -w "\n%{http_code}" "https://proxy.golang.org/github.com/cdot65/prisma-airs-go/@v/${TAG}.info")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Successfully published to proxy.golang.org"
          else
            echo "Proxy indexing returned $HTTP_CODE — may take a few minutes to propagate"
          fi

          echo "Requesting pkg.go.dev to index..."
          curl -s "https://pkg.go.dev/github.com/cdot65/prisma-airs-go@${TAG}" > /dev/null || true
          echo "Module will be available at: https://pkg.go.dev/github.com/cdot65/prisma-airs-go@${TAG}"
